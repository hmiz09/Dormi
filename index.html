<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Asrama Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .scroll-area { height: 350px; overflow-y: auto; background-color: #ffffff; border: 1px solid #dee2e6; padding: 10px; border-radius: 0.375rem; margin-bottom: 15px; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        .chat-bubble { background: #e9ecef; border-radius: 15px; padding: 8px 12px; margin-bottom: 8px; width: fit-content; max-width: 85%; font-size: 0.9rem; }
        .chat-me { background: #0d6efd; color: white; margin-left: auto; }
        .loading { text-align: center; color: #6c757d; font-style: italic; margin-top: 20px; }
        .member-badge { font-size: 0.7rem; padding: 3px 6px; border-radius: 8px; background: #e2e8f0; color: #333; }
        .btn-aksi { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; }
        .dropdown-menu.checklist-area { max-height: 200px; overflow-y: auto; font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container justify-content-center">
            <span class="navbar-brand mb-0 h1">🏠 Asrama Kita</span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">💰 Kas</h5>
                        <button class="btn btn-light btn-sm text-success fw-bold" data-bs-toggle="modal" data-bs-target="#modalRekap">Rekap</button>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="alert alert-success text-center fw-bold fs-5 mb-2 py-2">
                            Total Saldo: Rp <span id="saldo-angka">0</span>
                        </div>
                        
                        <div class="scroll-area flex-grow-1" id="list-kas">
                            <div class="loading">Memuat data kas...</div>
                        </div>

                        <div class="mt-auto bg-light p-2 border rounded">
                            <input type="hidden" id="kas-id">
                            
                            <label class="small fw-bold text-muted mb-1">Tanggal Transaksi</label>
                            <input type="date" class="form-control form-control-sm mb-2" id="kas-tgl">
                            
                            <div class="dropdown mb-2">
                                <button class="btn btn-outline-secondary btn-sm w-100 text-start d-flex justify-content-between align-items-center" type="button" id="btn-dropdown-pembayar" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
                                    <span>Pilih Nama Pembayar</span>
                                    <span style="font-size: 0.7rem;">▼</span>
                                </button>
                                <ul class="dropdown-menu w-100 p-2 checklist-area shadow" id="list-pembayar"></ul>
                            </div>
                            
                            <input type="text" class="form-control form-control-sm mb-2" id="kas-ket" placeholder="Keterangan (Cth: Beli Galon)">
                            <input type="text" class="form-control form-control-sm mb-2" id="kas-nom" placeholder="Nominal (Cth: 50.000)" oninput="formatRibuan(this)">
                            
                            <select class="form-select form-select-sm mb-3" id="kas-tipe">
                                <option value="masuk">Pemasukan (+)</option>
                                <option value="keluar">Pengeluaran (-)</option>
                            </select>
                            
                            <div class="d-flex gap-2">
                                <button class="btn btn-secondary btn-sm fw-bold w-100 d-none" id="btn-batal" onclick="batalEdit()">Batal</button>
                                <button class="btn btn-success btn-sm fw-bold w-100" id="btn-kas" onclick="simpanKas()">Simpan Transaksi</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="card-title mb-0 text-center">📅 Jadwal & Tugas</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="scroll-area flex-grow-1" id="list-jadwal">
                            <div class="loading">Memuat data jadwal...</div>
                        </div>
                        <div class="mt-auto">
                            <input type="text" class="form-control form-control-sm mb-2" id="jadwal-tugas" placeholder="Tugas">
                            <input type="text" class="form-control form-control-sm mb-2" id="jadwal-pic" placeholder="Nama Petugas">
                            <input type="date" class="form-control form-control-sm mb-2" id="jadwal-tgl">
                            <button class="btn btn-warning btn-sm w-100 fw-bold" id="btn-jadwal" onclick="tambahJadwal()">Tambah Jadwal</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-info text-white">
                        <h5 class="card-title mb-0 text-center">💬 Obrolan</h5>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="scroll-area flex-grow-1" id="list-chat">
                            <div class="loading">Memuat data chat...</div>
                        </div>
                        <div class="mt-auto input-group">
                            <input type="text" class="form-control form-control-sm" id="chat-input" placeholder="Tulis pesan..." onkeypress="if(event.key==='Enter') kirimPesan()">
                            <button class="btn btn-info btn-sm text-white fw-bold" id="btn-chat" onclick="kirimPesan()">Kirim</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalRekap" tabindex="-1" aria-labelledby="modalRekapLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="modalRekapLabel">📊 Rekap Iuran Anggota</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3 d-flex align-items-center gap-2 bg-light p-2 rounded border">
                        <label class="fw-bold small mb-0 w-100">Pilih Periode:</label>
                        <input type="month" class="form-control form-control-sm" id="filter-bulan" onchange="loadKas()">
                    </div>
                    <table class="table table-sm table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nama Anggota</th>
                                <th class="text-end">Status Bulan Ini</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-status"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // =====================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzTtAVH_BwmtLYsBgJrdJKDeYKa3fuyK1D6-zhONnXB4EWQprQxjkv2NSgWINV2LDh/exec";
        // =====================================================================

        const daftarAnggota = ["Haris", "Hisyam", "Erza", "Krisna", "Wahyu", "Bryan", "Riza", "Tohom", "Chadifa", "Imam", "Nobrian", "Abidzar", "Baretha", "Yudha", "Lalu"];
        let dataKasGlobal = [];

        const dateNow = new Date();
        const strTanggalHariIni = dateNow.getFullYear() + "-" + String(dateNow.getMonth() + 1).padStart(2, '0') + "-" + String(dateNow.getDate()).padStart(2, '0');
        document.getElementById('kas-tgl').value = strTanggalHariIni;
        const currentMonthString = dateNow.getFullYear() + "-" + String(dateNow.getMonth() + 1).padStart(2, '0');
        document.getElementById('filter-bulan').value = currentMonthString;

        function renderCheckboxNama() {
            const list = document.getElementById('list-pembayar');
            let html = `<li><div class="form-check"><input class="form-check-input check-nama" type="checkbox" value="Umum" id="chk-Umum" onchange="updateDropdownText()"><label class="form-check-label w-100" for="chk-Umum">Umum / Lainnya</label></div></li><li><hr class="dropdown-divider"></li>`;
            daftarAnggota.forEach(nama => {
                html += `<li><div class="form-check"><input class="form-check-input check-nama" type="checkbox" value="${nama}" id="chk-${nama}" onchange="updateDropdownText()"><label class="form-check-label w-100" for="chk-${nama}">${nama}</label></div></li>`;
            });
            list.innerHTML = html;
        }

        function updateDropdownText() {
            const checked = document.querySelectorAll('.check-nama:checked');
            const btn = document.getElementById('btn-dropdown-pembayar');
            if(checked.length === 0) btn.innerHTML = '<span>Pilih Nama Pembayar</span><span style="font-size: 0.7rem;">▼</span>';
            else if(checked.length === 1) btn.innerHTML = `<span class="fw-bold text-primary">${checked[0].value}</span><span style="font-size: 0.7rem;">▼</span>`;
            else btn.innerHTML = `<span class="fw-bold text-primary">${checked.length} Orang Terpilih</span><span style="font-size: 0.7rem;">▼</span>`;
        }

        function getNamaTerpilih() {
            return Array.from(document.querySelectorAll('.check-nama:checked')).map(cb => cb.value);
        }

        function resetCheckboxNama() {
            document.querySelectorAll('.check-nama').forEach(cb => cb.checked = false);
            updateDropdownText();
        }

        function formatRibuan(input) {
            let angka = input.value.replace(/[^0-9]/g, "");
            input.value = angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        async function fetchKasData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=Kas`);
                dataKasGlobal = await res.json();
                loadKas(); 
            } catch(e) { document.getElementById('list-kas').innerHTML = '<div class="text-danger small text-center">Gagal memuat kas.</div>'; }
        }

        function loadKas() {
            let totalSaldo = 0; let logHtml = ''; let rekap = {};
            const bulanDipilih = document.getElementById('filter-bulan').value;
            daftarAnggota.forEach(nama => rekap[nama] = 0);

            [...dataKasGlobal].reverse().forEach(item => {
                if(!item.id) return; 
                const isMasuk = item.tipe === 'masuk';
                const nom = Number(String(item.nominal).replace(/\./g, ""));
                totalSaldo += isMasuk ? nom : -nom;

                let periodeBersih = item.periode;
                if (periodeBersih && String(periodeBersih).includes('T')) {
                    const d = new Date(periodeBersih);
                    periodeBersih = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
                }

                const periodeCocok = !periodeBersih || String(periodeBersih).startsWith(bulanDipilih);
                if (isMasuk && rekap.hasOwnProperty(item.pembayar) && periodeCocok) { rekap[item.pembayar] += nom; }

                let tglRapi = item.tanggal;
                if(tglRapi && String(tglRapi).includes('T')) {
                    const d = new Date(tglRapi);
                    tglRapi = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                }

                logHtml += `
                    <div class="p-2 mb-2 border rounded bg-light d-flex justify-content-between align-items-center">
                        <div>
                            <span class="member-badge">${item.pembayar}</span>
                            <div class="fw-bold small mt-1">${item.ket}</div>
                            <div style="font-size: 0.6rem; color: #888;">📅 ${tglRapi || 'N/A'}</div>
                        </div>
                        <div class="text-end">
                            <div class="${isMasuk ? 'text-success' : 'text-danger'} small fw-bold mb-1">
                                ${isMasuk ? '+' : '-'} Rp ${nom.toLocaleString('id-ID')}
                            </div>
                            <button class="btn btn-outline-secondary btn-aksi" onclick="siapkanEdit('${item.id}')">Edit</button>
                            <button class="btn btn-outline-danger btn-aksi" onclick="hapusKas('${item.id}')">Hapus</button>
                        </div>
                    </div>`;
            });
            document.getElementById('list-kas').innerHTML = logHtml || '<div class="loading">Belum ada transaksi</div>';
            document.getElementById('saldo-angka').innerText = totalSaldo.toLocaleString('id-ID');

            let tabelHtml = '';
            daftarAnggota.forEach(nama => {
                const totalBayar = rekap[nama];
                const warnaTeks = totalBayar > 0 ? "text-success" : "text-danger";
                tabelHtml += `<tr><td>${nama}</td><td class="text-end fw-bold ${warnaTeks}">Rp ${totalBayar.toLocaleString('id-ID')}</td></tr>`;
            });
            document.getElementById('tabel-status').innerHTML = tabelHtml;
        }

        function siapkanEdit(id) {
            const item = dataKasGlobal.find(x => String(x.id) === String(id));
            if(!item) return;

            document.getElementById('kas-id').value = item.id;
            resetCheckboxNama();
            const chk = document.getElementById(`chk-${item.pembayar}`);
            if(chk) chk.checked = true;
            updateDropdownText();

            document.getElementById('kas-ket').value = item.ket;
            document.getElementById('kas-nom').value = Number(String(item.nominal).replace(/\./g, "")).toLocaleString('id-ID').replace(/,/g, ".");
            document.getElementById('kas-tipe').value = item.tipe;
            
            if(item.tanggal && String(item.tanggal).includes('T')) {
                const d = new Date(item.tanggal);
                document.getElementById('kas-tgl').value = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
            } else { document.getElementById('kas-tgl').value = item.tanggal; }

            document.getElementById('btn-kas').innerText = "Update Transaksi";
            document.getElementById('btn-kas').classList.replace('btn-success', 'btn-warning');
            document.getElementById('btn-batal').classList.remove('d-none');
        }

        function batalEdit() {
            document.getElementById('kas-id').value = '';
            resetCheckboxNama();
            document.getElementById('kas-ket').value = '';
            document.getElementById('kas-nom').value = '';
            document.getElementById('kas-tgl').value = strTanggalHariIni;
            document.getElementById('btn-kas').innerText = "Simpan Transaksi";
            document.getElementById('btn-kas').classList.replace('btn-warning', 'btn-success');
            document.getElementById('btn-batal').classList.add('d-none');
        }

        async function hapusKas(id) {
            if(!confirm("Yakin ingin menghapus transaksi ini?")) return;
            document.getElementById('list-kas').innerHTML = '<div class="loading">Menghapus...</div>';
            await fetch(`${SCRIPT_URL}?sheet=Kas`, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', id: id })
            });
            setTimeout(fetchKasData, 1500);
        }

        // --- SIMPAN KAS KILAT (BATCH/SINGLE) ---
        async function simpanKas() {
            const idTersembunyi = document.getElementById('kas-id').value;
            const tanggalPilih = document.getElementById('kas-tgl').value;
            const daftarPembayar = getNamaTerpilih();
            const ket = document.getElementById('kas-ket').value;
            const nominalStr = document.getElementById('kas-nom').value.replace(/\./g, "");
            const nominal = Number(nominalStr);
            const tipe = document.getElementById('kas-tipe').value;
            
            const periodeHitung = tanggalPilih.substring(0, 7);

            if (daftarPembayar.length === 0) return alert("Pilih minimal 1 nama pembayar!");
            if (!ket || !nominal || !tanggalPilih) return alert("Lengkapi Tanggal, Keterangan & Nominal!");
            if (idTersembunyi && daftarPembayar.length > 1) return alert("Mode Edit hanya boleh untuk 1 nama.");

            const btn = document.getElementById('btn-kas');
            btn.disabled = true; btn.innerText = "⏳ Menyimpan kilat...";

            if (idTersembunyi) {
                // Proses Edit (1 Data)
                await fetch(`${SCRIPT_URL}?sheet=Kas`, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'edit', id: idTersembunyi, pembayar: daftarPembayar[0], ket: ket, nominal: nominal, tipe: tipe, periode: periodeHitung, tanggal: tanggalPilih })
                });
            } else {
                // Proses Input Baru (Satu Karung Sekaligus)
                const dataBatch = [];
                for (const pembayar of daftarPembayar) {
                    // ID unik dengan timestamp + random agar tidak kembar saat simpan massal
                    const idKirim = Date.now().toString() + Math.floor(Math.random() * 1000);
                    dataBatch.push({ id: idKirim, pembayar: pembayar, ket: ket, nominal: nominal, tipe: tipe, periode: periodeHitung, tanggal: tanggalPilih });
                }
                
                await fetch(`${SCRIPT_URL}?sheet=Kas`, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'insert_batch', data: dataBatch })
                });
            }

            batalEdit();
            setTimeout(() => { btn.disabled = false; fetchKasData(); }, 1500);
        }

        async function loadJadwal() {
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=Jadwal`);
                const data = await res.json();
                let html = '';
                data.reverse().forEach(item => { html += `<div class="p-2 mb-2 border rounded bg-light small"><div class="fw-bold">${item.tugas}</div><div class="text-muted">👤 ${item.pic} | 📅 ${item.tgl}</div></div>`; });
                document.getElementById('list-jadwal').innerHTML = html || '<div class="loading">Belum ada jadwal</div>';
            } catch(e) {}
        }
        async function tambahJadwal() {
            const tugas = document.getElementById('jadwal-tugas').value;
            const pic = document.getElementById('jadwal-pic').value;
            const tgl = document.getElementById('jadwal-tgl').value;
            if(!tugas || !pic || !tgl) return alert("Lengkapi data jadwal!");
            await fetch(`${SCRIPT_URL}?sheet=Jadwal`, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'insert', tugas, pic, tgl }) });
            document.getElementById('jadwal-tugas').value = ''; document.getElementById('jadwal-pic').value = ''; document.getElementById('jadwal-tgl').value = '';
            setTimeout(loadJadwal, 1500);
        }

        async function loadChat() {
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=Chat`);
                const data = await res.json();
                let html = '';
                data.forEach(item => { html += `<div class="chat-bubble chat-me">${item.pesan}</div>`; });
                const list = document.getElementById('list-chat');
                list.innerHTML = html || '<div class="loading">Belum ada chat</div>';
                list.scrollTop = list.scrollHeight;
            } catch(e) {}
        }
        async function kirimPesan() {
            const pesan = document.getElementById('chat-input').value;
            if (!pesan) return;
            await fetch(`${SCRIPT_URL}?sheet=Chat`, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'insert', pesan, tipe: 'me' }) });
            document.getElementById('chat-input').value = '';
            setTimeout(loadChat, 1500);
        }

        window.onload = () => { 
            renderCheckboxNama();
            fetchKasData(); loadJadwal(); loadChat(); 
            setInterval(() => { fetchKasData(); loadJadwal(); loadChat(); }, 10000);
        };
    </script>
</body>
</html>
